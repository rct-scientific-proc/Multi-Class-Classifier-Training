# Configuration for testing stratified splitting with the rotated MNIST dataset.
# Uses image_bin_path to load all images from a single directory and splits
# them into train/val/test sets stratified by rotation angle bins.

# ==============================================================================
# Model Configuration
# ==============================================================================
model: "resnet18"
pretrained: true
freeze_backbone: false
freeze_layers: 0
dropout_rate: 0.5

# ==============================================================================
# Data Paths
# ==============================================================================

# These are ignored when image_bin_path is set, but kept for reference
train_directory: "data/mnist/train"
val_directory: "data/mnist/validate"
test_directory: "data/mnist/test"

output_directory: "results/mnist_rotated_flipped_stratified"

# Use the rotated MNIST bin — all images in one directory tree, split automatically
image_bin_path: "data/mnist_rotated_and_reflected"

# 60% train, 20% val (implicit), 20% test
train_val_split: 0.6
test_split: 0.2

# Stratify by rotation-angle bins so each split has a uniform angle distribution
# The CSV has raw float angles; stratify_bins tells the loader to auto-bin them.
stratification_csv: "local/mnist_rotated_reflected_stratification.csv"
stratify_columns: ["angle", "flipped"]
stratify_bins:
  angle: 10
  flipped: 2
# Controls how each stratification column's values are distributed across splits.
# Options per column:
#   "proportional" - (default) each split mirrors the original distribution.
#   "distinct"     - bins are sorted, then the first N go to train and the
#                    rest to eval. Produces a deterministic, ordered partition
#                    (e.g. train on low angles, eval on high angles).
#   "distinct_random" - like distinct, but bins are randomly shuffled before
#                    partitioning. The seed controls reproducibility. Use when
#                    you want non-overlapping bins but no ordered bias.
#   "uniform"      - after splitting, downsample every bin to the smallest
#                    bin's count so each bin is equally represented.
stratify_distribution:
  angle: "distinct_random"        # Train on some angle bins, evaluate on entirely different ones
  flipped: "uniform"       # Equal representation of flipped/not-flipped in each split


# ==============================================================================
# Data Loading & Augmentation
# ==============================================================================
num_workers: 1
pin_memory: true
image_size: [20, 20]
num_channels: 1
normalize_mean: [0.485, 0.456, 0.406]
normalize_std: [0.229, 0.224, 0.225]

augmentation:
  # Probability of flipping each image horizontally (left-right mirror).
  # Range: 0.0 (never) to 1.0 (always). Useful for natural images without
  # inherent horizontal directionality (e.g. landscapes, objects).
  horizontal_flip: 0.0

  # Probability of flipping each image vertically (top-bottom mirror).
  # Range: 0.0 to 1.0. Less commonly used; helpful for satellite/aerial imagery.
  vertical_flip: 0.0

  # Maximum random rotation in degrees (applied as ±rotation).
  # Set to 0 to disable. Example: 15 means each image is randomly rotated
  # between -15° and +15°.
  rotation: 0        # no extra rotation — the data already has rotation

  # Random affine transformation combining translation, scaling, and shearing.
  # - translate: [max_horizontal, max_vertical] as fractions of image size (e.g. 0.1 = 10%)
  # - scale: [min_scale, max_scale] zoom range (e.g. [0.9, 1.1] for ±10%)
  # - shear: max shear angle in degrees
  affine:
    enabled: true
    translate: [0.1, 0.1]
    scale: [0.9, 1.1]
    shear: 10

  # Randomly adjust brightness, contrast, saturation, and hue.
  # Only applies to RGB images (num_channels: 3); ignored for grayscale.
  # Each value is the max random shift: brightness/contrast/saturation are
  # multiplicative factors (e.g. 0.2 = ±20%), hue is absolute (max 0.5).
  color_jitter:
    enabled: true
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

  # Randomly erases a rectangular patch of the image (after normalization).
  # Helps prevent overfitting by forcing the model to use broader context.
  # - probability: chance of applying per image (0.0 to 1.0)
  # - scale: [min, max] fraction of image area to erase (e.g. [0.02, 0.33])
  # - ratio: [min, max] aspect ratio of the erased rectangle
  random_erasing:
    enabled: true
    probability: 0.5
    scale: [0.02, 0.33]
    ratio: [0.3, 3.3]

  # Mixup: blends pairs of training images and their labels using a random
  # weight drawn from a Beta(alpha, alpha) distribution. Encourages smoother
  # decision boundaries. alpha controls the blend strength — lower values
  # (e.g. 0.2) keep images mostly intact, higher values blend more aggressively.
  mixup:
    enabled: true
    alpha: 0.2

  # CutMix: replaces a random rectangular region of one image with a patch
  # from another, and mixes labels proportionally to the patch area.
  # alpha controls the Beta distribution for the cut ratio — 1.0 is standard.
  cutmix:
    enabled: true
    alpha: 1.0

# ==============================================================================
# Training Parameters
# ==============================================================================
batch_size: 64
eval_batch_size: 128
num_epochs: 2
gradient_accumulation_steps: 1
max_grad_norm: 1.0
mixed_precision: true
seed: 42

# ==============================================================================
# Optimizer Configuration
# ==============================================================================
optimizer: "AdamW"
learning_rate: 0.001
weight_decay: 0.0001
adam:
  betas: [0.9, 0.999]
  eps: 1.0e-8
  amsgrad: false

# ==============================================================================
# Learning Rate Scheduler
# ==============================================================================
learning_rate_scheduler: "CosineAnnealingLR"
warmup_epochs: 0
warmup_start_factor: 0.1
cosine_annealing_lr:
  T_max: 10
  eta_min: 1.0e-6

# ==============================================================================
# Loss Function
# ==============================================================================
loss_function: "FocalLoss"
label_smoothing: 0.1
focal_loss:
  alpha: 1.0
  gamma: 2.0
class_weights: "auto"

# ==============================================================================
# Evaluation & Metrics
# ==============================================================================
score_metric: "mcc"
additional_metrics:
  - "accuracy"
  - "f1_macro"
  - "precision"
  - "recall"
  - "confusion_matrix"
  - "per_class_accuracy"
compute_roc_curves: true

# ==============================================================================
# Checkpointing & Early Stopping
# ==============================================================================
save_every_n_epochs: 1
keep_top_k_checkpoints: 3
save_final_model: true
resume_from_checkpoint: null
early_stopping:
  enabled: true
  patience: 10
  min_delta: 0.001
  mode: "max"

# ==============================================================================
# Logging & Visualization
# ==============================================================================
log_level: "INFO"
log_every_n_steps: 10
tensorboard:
  enabled: false
wandb:
  enabled: false
save_predictions:
  enabled: false

# ==============================================================================
# Model Export
# ==============================================================================
export_onnx: false
export_torchscript: false
quantization:
  enabled: false
  backend: "fbgemm"

# ==============================================================================
# Hardware
# ==============================================================================
device: "cuda"
data_parallel: false
distributed:
  enabled: false
  backend: "nccl"
  world_size: 1
  rank: 0
